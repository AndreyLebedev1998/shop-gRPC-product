syntax = "proto3";

package products;

option go_package = "github.com/AndreyLebedev1998/shop-gRPC-product/productpb;productpb";

message Product {
    int64 id = 1;
    string product_name = 2;
    int64 category_id = 3;
    string category_name = 4;
    string image_url = 5;
    int64 availability_of_pieces = 6;
    double price = 7;
}

message UpdateProductQuantity {
    int64 product_id = 1;
    int64 quantity = 2;
}

message OrderItem {
    int64 product_id = 1;
    int64 quantity = 2;
    double price = 3;
}

message GetProductsRequest {
    repeated int64 product_ids = 1;
}

message GetProductsResponse {
    repeated Product products = 1;
}

message UpdateProductQuantityRequest {
    repeated UpdateProductQuantity newItems = 1;
    repeated UpdateProductQuantity oldItems = 2;
    bool isCreate = 3; // Создание заказа
    bool isDelete = 4; // Отмена заказа
}

message UpdateProductQuantityResponse {
    bool success = 1;
    string message = 2;
}

message NewProduct {
    string product_name = 1;
    int64 category_id = 2;
    string image_url = 3;
    int64 availability_of_pieces = 4;
    double price = 5;
}

message ReturnNewProduct {
    int64 id = 1;
    string product_name = 2;
    int64 category_id = 3;
    string image_url = 4;
    int64 availability_of_pieces = 5;
    double price = 6;
}

message NewCategory {
    string category_name = 2;
}

message ReturnNewCategory {
    int64 id = 1;
    string category_name = 2;
}

message ProductId {
    int64 id = 1;
}

message CategoryId {
    int64 id = 1;
}

message RemoveMessage {
    int64 id = 1;
    bool status = 2;
    string message = 3;
}

service ProductsService {
    rpc GetProductsByIds (GetProductsRequest) returns (GetProductsResponse);
    rpc UpdateProductQuantityByIds (UpdateProductQuantityRequest) returns (UpdateProductQuantityResponse);
    rpc CreateProduct (NewProduct) returns (ReturnNewProduct);
    rpc CreateCategory (NewCategory) returns (ReturnNewCategory);
    rpc ChangeProduct (ReturnNewProduct) returns (ReturnNewProduct);
    rpc ChangeCategory (ReturnNewCategory) returns (ReturnNewCategory);
    rpc RemoveProduct (ProductId) returns (RemoveMessage);
    rpc RemoveCategory (CategoryId) returns (RemoveMessage);
}
